<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#12161d" stroke="#2d3548" stroke-width="2"/>

  <!-- Inner glow ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <!-- Drone body - center -->
  <rect x="50" y="50" width="20" height="20" rx="4" fill="#f59e0b"/>

  <!-- Drone arms -->
  <line x1="55" y1="55" x2="30" y2="30" stroke="#e8edf5" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="55" x2="90" y2="30" stroke="#e8edf5" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="65" x2="30" y2="90" stroke="#e8edf5" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="65" x2="90" y2="90" stroke="#e8edf5" stroke-width="3" stroke-linecap="round"/>

  <!-- Propeller circles -->
  <circle cx="30" cy="30" r="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="90" cy="30" r="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="30" cy="90" r="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="90" cy="90" r="12" fill="none" stroke="#f59e0b" stroke-width="2"/>

  <!-- Propeller centers -->
  <circle cx="30" cy="30" r="3" fill="#f59e0b"/>
  <circle cx="90" cy="30" r="3" fill="#f59e0b"/>
  <circle cx="30" cy="90" r="3" fill="#f59e0b"/>
  <circle cx="90" cy="90" r="3" fill="#f59e0b"/>

  <!-- 107 text -->
  <text x="60" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#12161d">107</text>
</svg>
